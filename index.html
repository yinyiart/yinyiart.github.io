<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殷漪</title>
    <style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Helvetica Neue", "Helvetica", "Arial", "PingFang SC", "Microsoft YaHei", sans-serif;
        background-color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        text-align: center;
    }
    img {
        max-width: 90vw;
        max-height: 80vh;
        display: block;
        margin: 0 auto;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06); /* 更淡的阴影，更轻盈 */
    }
    .name {
        margin-top: 24px;          /* 稍增加间距，呼吸感 */
        font-size: 18px;            /* 更小的字号 */
        font-weight: 300;           /* 细体（如果字体支持） */
        letter-spacing: 2px;        /* 增加字母间距，更显雅致 */
        color: #555;                /* 深灰色，不刺眼 */
        text-transform: uppercase;  /* 可选：若名字是拼音，大写更有设计感 */
    }
</style>
</head>
<body>
    <div class="container">
        <img src="yinyi.jpg" alt="殷漪作品">
        <div class="name">殷漪</div>
    </div>
</body>
</html>
